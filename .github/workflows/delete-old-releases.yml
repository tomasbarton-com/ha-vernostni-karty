name: Delete Old Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete releases older than v0.3.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # IDs of releases to delete (all older than v0.3.0)
          RELEASE_IDS="338744131 338612871 338603247 338591057 338576342 338519801 338507654 338425253 338399030 338221862 338214380 338187748 338027712 337912459 337893258"
          for ID in $RELEASE_IDS; do
            echo "Deleting release $ID..."
            curl -s -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/$ID"
            echo "Done: $ID"
          done
          echo "All old releases deleted."
