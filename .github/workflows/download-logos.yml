name: Download Store Logos

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch-logos.js'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download logos from Clearbit
        run: node scripts/fetch-logos.js

      - name: Commit logos if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/loyalty_cards/www/logos/
          if git diff --cached --quiet; then
            echo "No new logos to commit."
          else
            git commit -m "chore: update bundled store logos"
            git push
          fi
