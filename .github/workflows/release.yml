name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ steps.ver.outputs.tag }} || true
          git push origin ${{ steps.ver.outputs.tag }} || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build card JS
        run: npm ci && npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            ## Věrnostní karty ${{ steps.ver.outputs.tag }}

            Od verze 0.3.0 jsou **integrace** a **ovládací panel** odděleny a instalují se zvlášť.

            ---

            ### 1. Instalace integrace (backend)

            Přes HACS jako vlastní repozitář:
            1. HACS → Integrace → tři tečky → Vlastní repozitáře
            2. Přidejte `https://github.com/tomasbarton-com/ha-vernostni-karty` jako typ **Integrace**
            3. Nainstalujte „Věrnostní karty" a restartujte HA

            ---

            ### 2. Instalace ovládacího panelu (Lovelace karta)

            Karta se instaluje samostatně jako Lovelace zdroj:

            **Možnost A – přes HACS (frontend plugin):**
            1. HACS → Frontend → tři tečky → Vlastní repozitáře
            2. Přidejte `https://github.com/tomasbarton-com/ha-vernostni-karty` jako typ **Lovelace**
            3. Nainstalujte „Věrnostní karty – karta"

            **Možnost B – ručně:**
            1. Stáhněte `loyalty-cards-card.js` z tohoto release
            2. Umístěte do `/config/www/loyalty-cards/loyalty-cards-card.js`
            3. Nastavení → Dashboardy → Zdroje → Přidat zdroj:
               - URL: `/local/loyalty-cards/loyalty-cards-card.js`
               - Typ: JavaScript modul

            ---

            ### 3. Přidání karty do dashboardu

            ```yaml
            type: custom:loyalty-cards-card
            ```
          files: |
            www/loyalty-cards/loyalty-cards-card.js
            icon.png
          make_latest: true
