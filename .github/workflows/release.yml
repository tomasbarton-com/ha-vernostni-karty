name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.1.2)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ steps.ver.outputs.tag }} || true
          git push origin ${{ steps.ver.outputs.tag }} || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            ## Věrnostní karty ${{ steps.ver.outputs.tag }}

            ### Instalace přes HACS
            1. HACS → Integrace → tři tečky → Vlastní repozitáře
            2. Přidejte `https://github.com/tomasbarton-com/ha-vernostni-karty`
            3. Nainstalujte „Věrnostní karty" a restartujte HA

            ### Přidání karty do dashboardu
            ```yaml
            type: custom:loyalty-cards-card
            ```
          files: |
            custom_components/loyalty_cards/www/loyalty-cards-card.js
            icon.png
          make_latest: true
